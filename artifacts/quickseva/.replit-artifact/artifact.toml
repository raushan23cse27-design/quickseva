kind = "web"
previewPath = "/"
title = "QuickSeva"
version = "1.0.0"
id = "artifacts/quickseva"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25927

[services.development]
run = "pnpm --filter @workspace/quickseva run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quickseva", "run", "build" ]
publicDir = "artifacts/quickseva/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25927"
BASE_PATH = "/"
